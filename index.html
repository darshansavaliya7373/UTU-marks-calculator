        <!-- Input Container -->
        <div class="glass p-6 bg-white/80 border-slate-100 shadow-xl relative">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-1 space-y-1">

                    <input type="text" id="subjectInput" placeholder="e.g. Web Development"

                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-1">IA 1 <span

                    <input type="number" id="ia1Input" placeholder="0"
                        class="w-full glass-input p-3 rounded-xl text-base font-semibold text-center border-2 border-slate-100">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-1">IA 2 <span
                            data-ia-max>(Max 30)</span></label>
                    <input type="number" id="ia2Input" placeholder="0"
                        class="w-full glass-input p-3 rounded-xl text-base font-semibold text-center border-2 border-slate-100">
                </div>
                <div>
                    <button id="addBtn" onclick="handleCalculate()"
                        class="w-full btn-black py-3 px-6 rounded-xl font-bold text-base flex items-center justify-center gap-2 shadow-xl bg-[#10b981] hover:bg-black transition-all">

                </div>
            </div>
            <div id="errorMsg" class="text-red-500 text-sm font-bold mt-4 hidden flex items-center gap-2">
                <i data-lucide="zap" class="w-5 h-5"></i>

            </div>
        </div>


        <!-- Results Area -->
        <div id="resultsSection" class="hidden fade-in">
            <div class="glass rounded-2xl bg-white/40 border-slate-100 overflow-hidden shadow-xl">
                <table class="w-full text-left">
                    <thead class="bg-white/80 border-b-2 border-slate-100">

                            <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Subject</th>
                            <th class="p-4 text-xs font-bold text-slate-500 text-center uppercase tracking-wider">IA
                                Avg</th>
                            <th class="p-4 text-xs font-bold text-slate-900 text-center uppercase tracking-widest">
                                Required Score</th>
                            <th class="p-4 text-xs font-bold text-slate-500 text-right uppercase tracking-wider">
                                Manage</th>
                        </tr>
                    </thead>
                    <tbody id="subjectsTableBody">
                        <!-- Data rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="glass p-12 text-center bg-white shadow-xl border-dashed border-2 border-slate-100">
            <div class="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">

                        d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z">
                    </path>
                    <path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"></path>
                    <path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"></path>
                </svg>
            </div>
            <p class="text-base text-slate-400 font-medium">Please enter your subject data to populate the dashboard.</p>
        </div>

        <!-- Bottom Ad Slot -->
        <div
            class="border-slate-100 mx-auto w-full max-w-4xl relative overflow-hidden h-[100px] flex items-center justify-center mt-12 ad-container hidden bg-transparent">
            <div class="ad-real-unit hidden flex flex-col items-center justify-center h-full w-full bg-transparent">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3940256099942544" data-ad-slot="1234567890"
                    data-ad-test="on" data-ad-format="auto" data-full-width-responsive="true"></ins>

    <!-- Expanded Footer (Minimal) -->
    <footer class="mt-6 py-4 bg-white border-t border-slate-100 px-6 md:px-12">

            <div class="text-center md:text-right space-y-1">

                <div
                    class="flex justify-center md:justify-end gap-6 text-[9px] font-black uppercase tracking-widest text-slate-400">

                    <a href="terms.html" class="hover:text-[#10b981] transition-colors">Terms</a>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" id="modalOverlay"></div>
        <div class="glass max-w-sm w-full p-6 bg-white relative z-10 shadow-xl scale-in pointer-events-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-black tracking-tight">Formula Settings</h2>
                <button id="closeSettings" class="text-slate-300 hover:text-black">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Target Passing Marks
                        (Default: 40)</label>
                    <input type="number" id="targetScoreSetting"
                        class="w-full glass-input p-3 rounded-lg text-base font-semibold border-2 border-slate-100"
                        placeholder="40">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">IA Max Marks (Default:
                        30)</label>
                    <input type="number" id="iaMaxSetting"
                        class="w-full glass-input p-3 rounded-lg text-base font-semibold border-2 border-slate-100"
                        placeholder="30">
                </div>
                <button id="saveSettingsBtn"
                    class="w-full bg-[#10b981] text-white p-3 rounded-xl text-base font-bold shadow-md hover:bg-black transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    <span>Apply Settings</span>
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Production: Show Ad Container ONLY on Successful Load
        function initializeAdMonitor() {
            const containers = document.querySelectorAll('.ad-container');

            containers.forEach(container => {
                const adUnit = container.querySelector('ins.adsbygoogle');
                if (!adUnit) return;

                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.type === 'attributes' && mutation.attributeName === 'data-ad-status') {
                            const status = adUnit.getAttribute('data-ad-status');
                            if (status === 'filled') {
                                container.classList.remove('hidden');
                                container.classList.add('fade-in');
                            } else if (status === 'unfilled') {
                                container.style.display = 'none'; // Ensure it stays hidden
                            }
                        }
                    });
                });

                observer.observe(adUnit, { attributes: true });

                // Fallback: Check height after long delay if status attribute isn't supported
                setTimeout(() => {
                    if (adUnit.offsetHeight > 0) {
                        container.classList.remove('hidden');
                        container.classList.add('fade-in');
                    }
                }, 5000);
            });
        }

        // Run monitor and simulation
        window.addEventListener('load', () => {
            initializeAdMonitor();

            // Simulation for local testing
            setTimeout(() => {
                // Simulate success locally:
                document.querySelectorAll('.ad-container').forEach(c => {
                    c.classList.remove('hidden');
                    c.classList.add('fade-in');
                });
                
                console.log('UTU Ad Monitor Active');
            }, 1000);
        });

        let subjectsData = [];
        let editIndex = -1;

        // Formula Configuration
        let config = {
            targetScore: 40,
            iaMax: 30
        };

        // Load Settings
        function loadConfig() {
            const saved = localStorage.getItem('utu_config');
            if (saved) {
                config = JSON.parse(saved);
            }
            // Update UI/Placeholder
            document.getElementById('targetScoreSetting').value = config.targetScore;
            document.getElementById('iaMaxSetting').value = config.iaMax;

            // Update labels dynamically in the main UI if needed
            document.querySelectorAll('[data-ia-max]').forEach(el => {
                el.innerText = `(Max ${config.iaMax})`;
            });
        }

        function saveConfig() {
            const target = parseFloat(document.getElementById('targetScoreSetting').value);
            const iaMax = parseFloat(document.getElementById('iaMaxSetting').value);

            if (isNaN(target) || isNaN(iaMax) || target <= 0 || iaMax <= 0) {
                alert('Please enter valid positive numbers for settings.');
                return;
            }

            config.targetScore = target;
            config.iaMax = iaMax;
            localStorage.setItem('utu_config', JSON.stringify(config));

            // Refresh table to update all calculations
            subjectsData = subjectsData.map(item => ({
                ...item,
                passingMarks: calculatePassingMarks(item.ia1, item.ia2)
            }));

            renderTable();
            closeModal();
            loadConfig(); // Refresh labels
        }

        // Modal Logic
        const modal = document.getElementById('settingsModal');
        function openModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('settingsBtn').addEventListener('click', openModal);
        document.getElementById('closeSettings').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', closeModal);
        document.getElementById('saveSettingsBtn').addEventListener('click', saveConfig);

        lucide.createIcons();
        loadConfig();

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            if (msg) {
                errorText.innerText = msg;
                errorMsg.classList.remove('hidden');
            } else {
                errorMsg.classList.add('hidden');
            }
        }

        function calculatePassingMarks(ia1, ia2) {
            const iaAverage = (ia1 + ia2) / 2;
            const res = config.targetScore - ((iaAverage * config.targetScore) / config.iaMax);
            return Math.max(0, res);
        }

        function handleCalculate() {
            const subjectInput = document.getElementById('subjectInput');
            const ia1Input = document.getElementById('ia1Input');
            const ia2Input = document.getElementById('ia2Input');
            const addBtn = document.getElementById('addBtn');

            const subject = subjectInput.value.trim();
            const ia1 = parseFloat(ia1Input.value);
            const ia2 = parseFloat(ia2Input.value);

            if (!subject) { showError('SUBJECT NAME REQUIRED'); return; }
            if (isNaN(ia1) || isNaN(ia2) || ia1 < 0 || ia2 < 0 || ia1 > config.iaMax || ia2 > config.iaMax) {
                showError(`INVALID IA DATA (EXPECTED 0-${config.iaMax})`); return;
            }

            showError('');
            const passingMarks = calculatePassingMarks(ia1, ia2);

            if (editIndex !== -1) {
                subjectsData[editIndex] = { subject, ia1, ia2, passingMarks };
                editIndex = -1;
                addBtn.innerHTML = '<i data-lucide="plus-circle" class="w-5 h-5"></i><span>Add Subject</span>';
                addBtn.classList.replace('bg-black', 'bg-[#10b981]');
            } else {
                subjectsData.push({ subject, ia1, ia2, passingMarks });
            }

            subjectInput.value = ''; ia1Input.value = ''; ia2Input.value = '';
            renderTable();
            lucide.createIcons();
        }

        function handleEdit(index) {
            const item = subjectsData[index];
            document.getElementById('subjectInput').value = item.subject;
            document.getElementById('ia1Input').value = item.ia1;
            document.getElementById('ia2Input').value = item.ia2;
            editIndex = index;
            const addBtn = document.getElementById('addBtn');
            addBtn.innerHTML = '<i data-lucide="save" class="w-5 h-5"></i><span>Save Data</span>';
            addBtn.classList.replace('bg-[#10b981]', 'bg-black');
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleDelete(index) {
            subjectsData.splice(index, 1);
            renderTable();
        }

        function renderTable() {
            const tableBody = document.getElementById('subjectsTableBody');
            const resultsSection = document.getElementById('resultsSection');
            const emptyState = document.getElementById('emptyState');

            if (subjectsData.length === 0) {
                resultsSection.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            resultsSection.classList.remove('hidden');
            emptyState.classList.add('hidden');

            tableBody.innerHTML = subjectsData.map((data, index) => `
                <tr class="border-b bg-white hover:bg-slate-50 transition-all group">
                    <td class="p-4 font-bold text-slate-950 text-base">${data.subject}</td>
                    <td class="p-4 text-center text-slate-500 font-medium text-base">${((data.ia1 + data.ia2) / 2).toFixed(1)}</td>
                    <td class="p-4 text-center">
                        <span class="bg-[#da3780] text-white px-4 py-2 rounded-xl text-base font-bold shadow-md">
                            ${data.passingMarks.toFixed(2)}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        <div class="flex justify-end gap-3">
                            <button onclick="handleEdit(${index})" class="p-2 hover:bg-slate-100 rounded-lg text-slate-400 hover:text-black transition-all">
                                <i data-lucide="settings" class="w-5 h-5"></i>
                            </button>
                            <button onclick="handleDelete(${index})" class="p-2 hover:bg-red-50 rounded-lg text-slate-400 hover:text-red-500 transition-all">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            lucide.createIcons();
        }
    </script>
</body>
